name: APK BUILD

on:
  push:
    branches: [ main ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Platforms
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r21e

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.2.5

      - name: Setup Haxelib
        run: haxelib setup ~/haxelib

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            ~/haxelib
            ~/.cache/haxelib
          key: haxelib-${{ runner.os }}-lime8
          restore-keys: |
            haxelib-${{ runner.os }}

      - name: Cache hxcpp
        uses: actions/cache@v4
        with:
          path: ~/.hxcpp
          key: hxcpp-${{ runner.os }}
          restore-keys: |
            hxcpp-${{ runner.os }}

      - name: Install Haxelib Libraries
        run: |
          haxelib install hxcpp 4.2.1 --quiet
          haxelib install lime 8.0.2 --quiet
          haxelib install openfl 9.3.3 --quiet
          haxelib install flixel 4.11.0 --quiet
          haxelib install flixel-tools --quiet
          haxelib install flixel-ui 2.5.0 --quiet
          haxelib install flixel-addons 2.11.0 --quiet
          haxelib install hxCodec --quiet
          haxelib install hscript 2.4.0 --quiet
          haxelib install newgrounds 1.1.5 --quiet
          haxelib set hxcpp 4.2.1
          haxelib set lime 8.0.2
          haxelib set openfl 9.3.3
          haxelib set flixel 4.11.0
          haxelib set flixel-ui 2.5.0
          haxelib set flixel-addons 2.11.0

      - name: Install Git Libraries
        run: |
          haxelib git polymod https://github.com/larsiusprime/polymod

          git clone https://github.com/Aidan63/linc_discord-rpc discord_rpc
          haxelib dev discord_rpc discord_rpc

          git clone https://github.com/Dot-Stuff/flxanimate flxanimate
          haxelib dev flxanimate flxanimate

          git clone https://github.com/superpowers04/linc_luajit linc_luajit
          haxelib dev linc_luajit linc_luajit

          git clone https://github.com/MatheusSilver/extension-webview extension-webview
          haxelib dev extension-webview extension-webview

          git clone https://github.com/MAJigsaw77/extension-androidtools extension-androidtools
          haxelib dev extension-androidtools extension-androidtools

      - name: Configure Lime
        run: |
          haxelib run lime setup -y
          haxelib run lime setup android -y
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT $ANDROID_NDK_HOME
          haxelib run lime config JAVA_HOME $JAVA_HOME
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Rebuild LuaJIT
        run: haxelib run lime rebuild linc_luajit android -v
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Compile Game
        id: compile
        run: haxelib run lime build android -debug -v 2>&1 | tee build.log; exit ${PIPESTATUS[0]}
        continue-on-error: true
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Show Compile Log Tail
        if: always()
        run: |
          echo "=== LAST 150 LINES OF BUILD LOG ==="
          tail -150 build.log 2>/dev/null || echo "build.log not found"

      - name: Find APK
        if: always()
        run: |
          echo "=== Searching for APK ==="
          find . -name "*.apk" 2>/dev/null || echo "NO APK FOUND ANYWHERE"
          echo ""
          echo "=== Export folder ==="
          ls -la export/ 2>/dev/null || echo "export/ folder does NOT exist - build failed"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: FNF-Android-Build
          path: export/debug/android/bin/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
